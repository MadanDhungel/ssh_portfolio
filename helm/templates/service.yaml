apiVersion: v1
kind: Service
metadata:
  name: ssh-portfolio
  labels:
    app: ssh-portfolio
spec:
  type: {{ .Values.service.type }}
  {{- if eq .Values.service.type "NodePort" }}
  {{- if .Values.service.nodePort }}
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    nodePort: {{ .Values.service.nodePort }}
    name: ssh
  {{- else }}
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    name: ssh
  {{- end }}
  {{- else }}
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    name: ssh
  {{- end }}
  selector:
    app: ssh-portfolio
